<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📝 金子メモ</title>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0d;
  --surface: #111111;
  --card: #171717;
  --card-hover: #1e1e1e;
  --border: #242424;
  --border-light: #2e2e2e;
  --accent: #4488ff;
  --accent-glow: rgba(68,136,255,0.18);
  --red: #ff4444;
  --text: #e2e2e2;
  --text-sub: #888;
  --text-dim: #444;
  --modal-bg: #1c1c1c;
  --logo-color: #00ffff;
  --logo-glow: rgba(0,255,255,0.5);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  height: 52px;
}

.logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--logo-color);
  text-shadow: 0 0 12px var(--logo-glow);
  white-space: nowrap;
  letter-spacing: -0.3px;
}

.tabs {
  display: flex;
  gap: 3px;
  background: var(--bg);
  padding: 3px;
  border-radius: 7px;
}
.tab-btn {
  padding: 5px 14px;
  background: transparent;
  border: none;
  color: var(--text-sub);
  border-radius: 5px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
  white-space: nowrap;
}
.tab-btn.active { background: var(--accent); color: #fff; }
.tab-btn:hover:not(.active) { background: var(--card); color: var(--text); }

.search-wrap {
  flex: 1;
  max-width: 380px;
  position: relative;
  margin-left: auto;
}
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 13px;
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 6px 10px 6px 30px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-dim); }

.header-btns { display: flex; gap: 6px; }
.icon-btn {
  width: 32px;
  height: 32px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-sub);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Theme picker ── */
.theme-picker-wrap { position: relative; }
.theme-dropdown {
  position: absolute;
  right: 0;
  top: calc(100% + 8px);
  background: var(--modal-bg);
  border: 1px solid var(--border-light);
  border-radius: 10px;
  padding: 12px;
  width: 248px;
  display: none;
  z-index: 300;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.theme-dropdown.show { display: block; }
.theme-dropdown-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 10px;
}
.theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.theme-card {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 9px;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 12px;
  color: var(--text-sub);
}
.theme-card:hover { border-color: var(--border-light); color: var(--text); background: var(--card); }
.theme-card.active { border-color: var(--accent); color: var(--text); }
.theme-preview { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1); }

/* ── Main ── */
.main {
  flex: 1;
  overflow: hidden;
  display: flex;
  min-height: 0;
}

/* ── Tab panels ── */
.tab-panel { display: none; flex: 1; overflow: hidden; }
.tab-panel.active { display: flex; }

/* ── Bookmark layout ── */
.bm-layout { flex: 1; display: flex; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: 210px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-top {
  padding: 10px 12px 6px;
  border-bottom: 1px solid var(--border);
}
.sidebar-section-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}
.folder-all-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-sub);
  transition: all 0.1s;
}
.folder-all-btn:hover { background: var(--card); color: var(--text); }
.folder-all-btn.active { background: var(--accent-glow); color: var(--accent); }

.sidebar-folders {
  flex: 1;
  overflow-y: auto;
  padding: 6px 8px;
}
.sidebar-folders-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 4px 6px;
}
.sidebar-folders-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.folder-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 8px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.1s;
  position: relative;
}
.folder-item:hover { background: var(--card); }
.folder-item.active { background: var(--accent-glow); }
.folder-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.folder-label { flex: 1; min-width: 0; }
.folder-name-text {
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.folder-item.active .folder-name-text { color: var(--accent); }
.folder-memo-preview {
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.folder-count-badge {
  font-size: 10px;
  color: var(--text-dim);
  background: var(--border);
  padding: 1px 5px;
  border-radius: 8px;
  flex-shrink: 0;
}
.folder-actions-inline {
  display: none;
  gap: 2px;
  position: absolute;
  right: 6px;
}
.folder-item:hover .folder-actions-inline { display: flex; }
.folder-item:hover .folder-count-badge { display: none; }
.folder-action-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-sub);
  cursor: pointer;
  width: 22px;
  height: 22px;
  border-radius: 4px;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
}
.folder-action-btn:hover { color: var(--text); border-color: var(--border-light); }
.folder-action-btn.del:hover { color: var(--red); border-color: var(--red); }

/* ── Bookmark content ── */
.bm-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.bm-content-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.content-title-wrap { min-width: 0; }
.content-title {
  font-size: 15px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.content-folder-memo {
  font-size: 11px;
  color: var(--text-sub);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bm-grid-wrap { flex: 1; overflow-y: auto; padding: 14px 18px; }
.bm-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
  gap: 10px;
}

/* Bookmark card */
.bm-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.bm-card:hover {
  border-color: var(--accent);
  box-shadow: 0 0 14px var(--accent-glow);
  transform: translateY(-1px);
  background: var(--card-hover);
}
.bm-card-actions-overlay {
  position: absolute;
  top: 6px;
  right: 6px;
  display: none;
  gap: 3px;
}
.bm-card:hover .bm-card-actions-overlay { display: flex; }
.bm-card-action {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-sub);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  transition: all 0.1s;
}
.bm-card-action:hover { color: var(--text); border-color: var(--border-light); }
.bm-card-action.del:hover { color: var(--red); border-color: var(--red); }

.bm-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.bm-favicon { width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0; }
.bm-favicon-placeholder {
  width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0;
  background: var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--text-dim);
}
.bm-card-name { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bm-card-url { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
.bm-card-memo { font-size: 11px; color: var(--text-sub); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.bm-card-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 7px; }
.bm-tag { font-size: 10px; padding: 1px 7px; background: var(--accent-glow); color: var(--accent); border-radius: 10px; }

/* ── View toggle ── */
.view-toggles { display: flex; gap: 2px; background: var(--bg); padding: 2px; border-radius: 5px; }
.view-toggle-btn {
  width: 28px; height: 28px; background: transparent; border: none;
  border-radius: 4px; cursor: pointer; font-size: 14px; color: var(--text-dim);
  display: flex; align-items: center; justify-content: center; transition: all 0.1s;
}
.view-toggle-btn.active { background: var(--accent); color: #fff; }
.view-toggle-btn:hover:not(.active) { background: var(--card); color: var(--text); }

/* ── Tag group view ── */
.tag-group { margin-bottom: 22px; }
.tag-group-header {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px;
}
.tag-group-label {
  font-size: 13px; font-weight: 700; color: var(--accent);
  background: var(--accent-glow); padding: 2px 10px; border-radius: 10px;
}
.tag-group-count { font-size: 11px; color: var(--text-dim); }

/* ── Drag & Drop ── */
.bm-card.dragging { opacity: 0.35; border-style: dashed; transform: none; }
.bm-card.drag-over { border-color: var(--accent); background: var(--accent-glow); box-shadow: 0 0 16px var(--accent-glow); }
.bm-grid.drag-active .bm-card { cursor: grabbing; }
.bm-emoji-icon { font-size: 18px; flex-shrink: 0; line-height: 1; width: 18px; text-align: center; }

/* ── Emoji picker ── */
.emoji-picker-row { display: flex; align-items: center; gap: 6px; }
.emoji-input-wrap { position: relative; display: flex; align-items: center; gap: 6px; flex: 1; }
.emoji-preview { font-size: 22px; width: 34px; text-align: center; flex-shrink: 0; }
.emoji-clear-btn {
  background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  cursor: pointer; padding: 3px 8px; border-radius: 4px; font-size: 11px;
  white-space: nowrap; transition: all 0.1s;
}
.emoji-clear-btn:hover { border-color: var(--red); color: var(--red); }
.emoji-presets { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.emoji-preset-btn {
  width: 30px; height: 30px; background: var(--card); border: 1px solid var(--border);
  border-radius: 5px; cursor: pointer; font-size: 15px; transition: all 0.1s;
  display: flex; align-items: center; justify-content: center;
}
.emoji-preset-btn:hover { border-color: var(--accent); background: var(--accent-glow); }

/* ── Account tab ── */
.acc-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.acc-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.acc-title { font-size: 15px; font-weight: 600; }
.acc-table-wrap { flex: 1; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 1;
}
td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
tr:hover td { background: var(--card); }

.acc-site-cell { display: flex; align-items: center; gap: 8px; }
.acc-favicon { width: 16px; height: 16px; border-radius: 3px; }
.acc-url-link { color: var(--accent); text-decoration: none; font-size: 12px; }
.acc-url-link:hover { text-decoration: underline; }
.acc-type-chip {
  display: inline-block; padding: 2px 9px; border-radius: 10px;
  font-size: 11px; font-weight: 500;
}
.acc-type-chip.personal { background: rgba(0,232,122,0.1); color: #00cc66; }
.acc-type-chip.business { background: rgba(68,136,255,0.1); color: #4488ff; }
.acc-type-chip.other    { background: rgba(170,68,255,0.1); color: #aa44ff; }
.acc-memo-cell { color: var(--text-sub); font-size: 12px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pw-cell { display: flex; align-items: center; gap: 6px; }
.pw-masked { font-size: 13px; color: var(--text-dim); letter-spacing: 2px; }
.pw-reveal-btn {
  background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  cursor: pointer; padding: 2px 6px; border-radius: 4px; font-size: 11px; transition: all 0.1s;
  white-space: nowrap; flex-shrink: 0;
}
.pw-reveal-btn:hover { border-color: var(--accent); color: var(--accent); }
.pw-text { font-size: 12px; font-family: monospace; color: var(--text); word-break: break-all; }
.tbl-action-btn {
  background: transparent; border: 1px solid var(--border); color: var(--text-sub);
  cursor: pointer; padding: 3px 9px; border-radius: 4px; font-size: 11px;
  margin-right: 4px; transition: all 0.1s;
}
.tbl-action-btn:hover { border-color: var(--accent); color: var(--accent); }
.tbl-action-btn.del:hover { border-color: var(--red); color: var(--red); }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.empty-icon { font-size: 36px; margin-bottom: 10px; }
.empty-msg { font-size: 13px; line-height: 1.6; }

/* ── Buttons ── */
.btn { padding: 6px 14px; border-radius: 6px; border: 1px solid transparent; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { filter: brightness(1.15); }
.btn-secondary { background: transparent; color: var(--text-sub); border-color: var(--border); }
.btn-secondary:hover { border-color: var(--border-light); color: var(--text); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

.add-folder-btn {
  display: flex; align-items: center; gap: 5px; padding: 5px 8px; border-radius: 5px;
  background: transparent; border: 1px dashed var(--border); color: var(--text-dim);
  cursor: pointer; font-size: 12px; width: 100%; margin-top: 4px; transition: all 0.15s;
}
.add-folder-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--modal-bg);
  border: 1px solid var(--border-light);
  border-radius: 10px;
  padding: 22px 24px;
  width: 430px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  transform: scale(0.96);
  transition: transform 0.2s;
}
.modal-overlay.show .modal { transform: scale(1); }
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 18px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

/* Form */
.form-group { margin-bottom: 13px; }
.form-label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 5px; font-weight: 500; }
.form-input, .form-textarea, .form-select {
  width: 100%;
  padding: 8px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  font-family: inherit;
  transition: border-color 0.15s;
}
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
.form-input::placeholder, .form-textarea::placeholder { color: var(--text-dim); }
.form-textarea { resize: vertical; min-height: 70px; }
.form-select option { background: var(--modal-bg); }

/* Color picker */
.color-swatches { display: flex; gap: 7px; flex-wrap: wrap; }
.color-swatch {
  width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all 0.12s;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: #fff; transform: scale(1.1); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="header">
  <div class="logo">📝 金子メモ</div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('bm')">🔖 ブックマーク</button>
    <button class="tab-btn" onclick="switchTab('acc')">👤 アカウント台帳</button>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="検索..." oninput="renderAll()">
  </div>

  <div class="header-btns">
    <!-- Theme picker -->
    <div class="theme-picker-wrap">
      <button class="icon-btn" id="themeBtn" onclick="toggleThemePicker()" title="テーマ切替">🎨</button>
      <div class="theme-dropdown" id="themeDropdown">
        <div class="theme-dropdown-title">テーマ</div>
        <div class="theme-grid" id="themeGrid"></div>
      </div>
    </div>
    <button class="icon-btn" onclick="exportData()" title="JSONでバックアップ">⬇</button>
    <button class="icon-btn" onclick="document.getElementById('importFile').click()" title="バックアップから復元">⬆</button>
    <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(event)">
  </div>
</header>

<!-- ═══ MAIN ═══ -->
<div class="main">

  <!-- ── Bookmark tab ── -->
  <div class="tab-panel active" id="bmPanel">
    <div class="bm-layout">
      <div class="sidebar">
        <div class="sidebar-top">
          <div class="sidebar-section-label">表示</div>
          <div class="folder-all-btn active" id="folderAllBtn" onclick="selectFolder(null)">
            📚 すべてのブックマーク
          </div>
        </div>
        <div class="sidebar-folders">
          <div class="sidebar-folders-header">
            <span class="sidebar-folders-label">フォルダ</span>
          </div>
          <div id="folderList"></div>
          <button class="add-folder-btn" onclick="openFolderModal()">＋ フォルダを追加</button>
        </div>
      </div>

      <div class="bm-content">
        <div class="bm-content-header">
          <div class="content-title-wrap">
            <div class="content-title" id="contentTitle">すべてのブックマーク</div>
            <div class="content-folder-memo hidden" id="contentMemo"></div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="view-toggles">

let currentThemeId = localStorage.getItem('kaneko_theme') || 'dark';

function applyTheme(id) {
  const t = THEMES[id];
  if (!t) return;
  const root = document.documentElement;
  Object.entries(t.vars).forEach(([k, v]) => root.style.setProperty(k, v));
  currentThemeId = id;
  localStorage.setItem('kaneko_theme', id);
  renderThemeGrid();
}

function toggleThemePicker() {
  document.getElementById('themeDropdown').classList.toggle('show');
}

function renderThemeGrid() {
  document.getElementById('themeGrid').innerHTML = Object.entries(THEMES).map(([id, t]) =>
    `<div class="theme-card${id===currentThemeId?' active':''}" onclick="applyTheme('${id}');toggleThemePicker()">
      <div class="theme-preview" style="background:linear-gradient(135deg,${t.preview[0]} 50%,${t.preview[1]} 50%)"></div>
      <span>${t.emoji} ${t.name}</span>
    </div>`
  ).join('');
}

// ─────────────────────────────────────
//  Data
// ─────────────────────────────────────
const STORAGE_KEY = 'kaneko_memo_v1';
const COLORS = ['#4488ff','#00e87a','#ff4444','#ffaa00','#aa44ff','#ff44aa','#00ccee','#ff8844','#44ddaa'];
const TYPE_LABELS = { personal: '個人', business: '業務', other: 'その他' };
const FAVICON = domain => `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;

let db = loadDB();
let selectedFolderId = null;
let editingFolderId  = null;
let editingBmId      = null;
let editingAccId     = null;
let pickedColor      = COLORS[0];
let viewMode         = 'grid';

function loadDB() {
  // 旧キー (myhub_v1) からの移行
  const legacy = localStorage.getItem('myhub_v1');
  if (legacy) {
    try {
      const d = JSON.parse(legacy);
      localStorage.setItem(STORAGE_KEY, legacy);
      localStorage.removeItem('myhub_v1');
      return d;
    } catch {}
  }
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || emptyDB(); }
  catch { return emptyDB(); }
}
function emptyDB() { return { folders: [], bookmarks: [], accounts: [] }; }
function saveDB() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }
function uid() { return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)+Date.now().toString(36); }
function getDomain(url) { try { return new URL(url).hostname; } catch { return null; } }
function q() { return document.getElementById('searchInput').value.toLowerCase().trim(); }

// ─────────────────────────────────────
//  Tab
// ─────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===(tab==='bm'?0:1)));
  document.getElementById('bmPanel').classList.toggle('active', tab==='bm');
  document.getElementById('accPanel').classList.toggle('active', tab==='acc');
}

// ─────────────────────────────────────
//  Render
// ─────────────────────────────────────
function renderAll() { renderFolders(); renderBookmarks(); renderAccounts(); }

function renderFolders() {
  document.getElementById('folderAllBtn').classList.toggle('active', selectedFolderId===null);
  document.getElementById('folderList').innerHTML = db.folders.map(f => {
    const count = db.bookmarks.filter(b=>b.folderId===f.id).length;
    return `<div class="folder-item${selectedFolderId===f.id?' active':''}" onclick="selectFolder('${f.id}')">
      <span class="folder-dot" style="background:${f.color}"></span>
      <div class="folder-label">
        <div class="folder-name-text">${esc(f.name)}</div>
        ${f.memo?`<div class="folder-memo-preview">${esc(f.memo)}</div>`:''}
      </div>
      <span class="folder-count-badge">${count}</span>
      <div class="folder-actions-inline">
        <button class="folder-action-btn" onclick="event.stopPropagation();openFolderModal('${f.id}')">✏</button>
        <button class="folder-action-btn del" onclick="event.stopPropagation();deleteFolder('${f.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function filterBm() {
  const query = q();
  let bms = db.bookmarks;
  if (selectedFolderId) bms = bms.filter(b=>b.folderId===selectedFolderId);
  if (query) bms = bms.filter(b=>
    b.name.toLowerCase().includes(query) ||
    (b.url||'').toLowerCase().includes(query) ||
    (b.memo||'').toLowerCase().includes(query) ||
    (b.tags||[]).some(t=>t.toLowerCase().includes(query))
  );
  return bms;
}

function bmCardHtml(b, draggable=true) {
  const domain = getDomain(b.url);
  const tags = (b.tags||[]).filter(Boolean).map(t=>`<span class="bm-tag">${esc(t)}</span>`).join('');
  const iconHtml = b.customIcon
    ? `<span class="bm-emoji-icon">${b.customIcon}</span>`
    : domain
      ? `<img class="bm-favicon" src="${FAVICON(domain)}" onerror="this.outerHTML='<span class=bm-favicon-placeholder>🔗</span>'">`
      : '<span class="bm-favicon-placeholder">🔗</span>';
  const dragAttrs = draggable
    ? `draggable="true" ondragstart="onDragStart(event,'${b.id}')" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${b.id}')" ondragend="onDragEnd(event)"`
    : '';
  return `<div class="bm-card" ${dragAttrs} onclick="openUrl('${esc(b.url)}')">
    <div class="bm-card-actions-overlay">
      <button class="bm-card-action" onclick="event.stopPropagation();openBookmarkModal('${b.id}')">✏</button>
      <button class="bm-card-action del" onclick="event.stopPropagation();deleteBm('${b.id}')">✕</button>
    </div>
    <div class="bm-card-top">${iconHtml}<span class="bm-card-name">${esc(b.name)}</span></div>
    <div class="bm-card-url">${esc(b.url||'')}</div>
    ${b.memo?`<div class="bm-card-memo">${esc(b.memo)}</div>`:''}
    ${tags?`<div class="bm-card-tags">${tags}</div>`:''}
  </div>`;
}

function renderBookmarks() {
  const bms = filterBm();
  const folder = db.folders.find(f=>f.id===selectedFolderId);
  document.getElementById('contentTitle').textContent = folder?folder.name:'すべてのブックマーク';
  const memoEl = document.getElementById('contentMemo');
  if (folder?.memo) { memoEl.textContent=folder.memo; memoEl.classList.remove('hidden'); }
  else { memoEl.classList.add('hidden'); }

  const grid = document.getElementById('bmGrid');
  if (!bms.length) {
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🔖</div>
      <div class="empty-msg">ブックマークがありません<br><span style="font-size:12px">右上の「＋ ブックマーク追加」から追加できます</span></div>
    </div>`; return;
  }

  if (viewMode === 'tags') {
    renderByTag(bms, grid);
  } else {
    grid.style.display = '';
    grid.innerHTML = bms.map(b=>bmCardHtml(b, true)).join('');
  }
}

function renderByTag(bms, grid) {
  // タグでグループ化（複数タグのブックマークは各グループに表示）
  const groups = new Map(); // tag -> bookmark[]
  const noTag = [];
  bms.forEach(b => {
    const tags = (b.tags||[]).filter(Boolean);
    if (!tags.length) { noTag.push(b); return; }
    tags.forEach(t => {
      if (!groups.has(t)) groups.set(t, []);
      groups.get(t).push(b);
    });
  });

  // グリッドをラッパーに切り替え
  grid.style.display = 'block';
  const sections = [];
  groups.forEach((items, tag) => {
    sections.push(`<div class="tag-group">
      <div class="tag-group-header">
        <span class="tag-group-label">🏷 ${esc(tag)}</span>
        <span class="tag-group-count">${items.length} 件</span>
      </div>
      <div class="bm-grid">${items.map(b=>bmCardHtml(b, false)).join('')}</div>
    </div>`);
  });
  if (noTag.length) {
    sections.push(`<div class="tag-group">
      <div class="tag-group-header">
        <span class="tag-group-label" style="background:var(--border);color:var(--text-sub)">タグなし</span>
        <span class="tag-group-count">${noTag.length} 件</span>
      </div>
      <div class="bm-grid">${noTag.map(b=>bmCardHtml(b, false)).join('')}</div>
    </div>`);
  }
  grid.innerHTML = sections.join('');
}

function setViewMode(mode) {
  viewMode = mode;
  document.getElementById('viewGrid').classList.toggle('active', mode==='grid');
  document.getElementById('viewTags').classList.toggle('active', mode==='tags');
  renderBookmarks();
}

function renderAccounts() {
  const query = q();
  let accs = db.accounts;
  if (query) accs = accs.filter(a=>
    a.site.toLowerCase().includes(query) ||
    a.accountName.toLowerCase().includes(query) ||
    (a.url||'').toLowerCase().includes(query) ||
    (a.memo||'').toLowerCase().includes(query)
  );
  const body = document.getElementById('accBody');
  if (!accs.length) {
    body.innerHTML=`<tr><td colspan="6"><div class="empty-state">
      <div class="empty-icon">👤</div>
      <div class="empty-msg">アカウントがありません<br><span style="font-size:12px">右上の「＋ アカウント追加」から追加できます</span></div>
    </div></td></tr>`; return;
  }
  body.innerHTML = accs.map(a=>{
    const domain = getDomain(a.url);
    const pwCell = a.password
      ? `<div class="pw-cell">
           <span class="pw-masked" id="pw-mask-${a.id}">●●●●●●</span>
           <span class="pw-text" id="pw-text-${a.id}" style="display:none">${esc(a.password)}</span>
           <button class="pw-reveal-btn" onclick="togglePwCell('${a.id}')">表示</button>
         </div>`
      : '<span style="color:var(--text-dim)">—</span>';
    return `<tr>
      <td><div class="acc-site-cell">
        ${domain?`<img class="acc-favicon" src="${FAVICON(domain)}" onerror="this.style.display='none'">`:'' }
        <strong>${esc(a.site)}</strong>
      </div></td>
      <td>${a.url?`<a class="acc-url-link" href="${esc(a.url)}" target="_blank">${esc(a.url)}</a>`:'—'}</td>
      <td>${esc(a.accountName)}</td>
      <td>${pwCell}</td>
      <td><span class="acc-type-chip ${a.type||'personal'}">${TYPE_LABELS[a.type]||a.type}</span></td>
      <td class="acc-memo-cell" title="${esc(a.memo||'')}">${esc(a.memo||'—')}</td>
      <td>
        <button class="tbl-action-btn" onclick="openAccountModal('${a.id}')">編集</button>
        <button class="tbl-action-btn del" onclick="deleteAcc('${a.id}')">削除</button>
      </td>
    </tr>`;
  }).join('');
}

// ─────────────────────────────────────
//  Folder CRUD
// ─────────────────────────────────────
function selectFolder(id) { selectedFolderId=id; renderFolders(); renderBookmarks(); }

function openFolderModal(id) {
  editingFolderId = id||null;
  const f = id ? db.folders.find(x=>x.id===id) : null;
  document.getElementById('folderModalTitle').textContent = id?'フォルダを編集':'フォルダを追加';
  document.getElementById('fName').value = f?.name||'';
  document.getElementById('fMemo').value = f?.memo||'';
  pickedColor = f?.color||COLORS[0];
  renderColorSwatches();
  openModal('folderModal');
  setTimeout(()=>document.getElementById('fName').focus(),50);
}

function saveFolder() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').focus(); return; }
  const memo = document.getElementById('fMemo').value.trim();
  if (editingFolderId) {
    const f = db.folders.find(x=>x.id===editingFolderId);
    if (f) Object.assign(f,{name,memo,color:pickedColor});
  } else {
    db.folders.push({id:uid(),name,memo,color:pickedColor});
  }
  saveDB(); closeModal('folderModal'); renderAll();
}

function deleteFolder(id) {
  if (!confirm('フォルダを削除しますか？（中のブックマークもすべて削除されます）')) return;
  db.bookmarks = db.bookmarks.filter(b=>b.folderId!==id);
  db.folders   = db.folders.filter(f=>f.id!==id);
  if (selectedFolderId===id) selectedFolderId=null;
  saveDB(); renderAll();
}

// ─────────────────────────────────────
//  Bookmark CRUD
// ─────────────────────────────────────
function openBookmarkModal(id) {
  editingBmId = id||null;
  const b = id ? db.bookmarks.find(x=>x.id===id) : null;
  document.getElementById('bmModalTitle').textContent = id?'ブックマークを編集':'ブックマークを追加';
  document.getElementById('bmIcon').value  = b?.customIcon||'';
  document.getElementById('bmName').value  = b?.name||'';
  document.getElementById('bmUrl').value   = b?.url||'';
  document.getElementById('bmTags').value  = (b?.tags||[]).join(', ');
  document.getElementById('bmMemo').value  = b?.memo||'';
  updateIconPreview();
  const sel = document.getElementById('bmFolderSel');
  sel.innerHTML = '<option value="">── フォルダなし ──</option>' +
    db.folders.map(f=>`<option value="${f.id}"${(b?b.folderId===f.id:selectedFolderId===f.id)?' selected':''}>${esc(f.name)}</option>`).join('');
  openModal('bookmarkModal');
  setTimeout(()=>document.getElementById('bmName').focus(),50);
}

function saveBookmark() {
  const name = document.getElementById('bmName').value.trim();
  const url  = document.getElementById('bmUrl').value.trim();
  if (!name||!url) { alert('名前とURLは必須です'); return; }
  const customIcon = document.getElementById('bmIcon').value.trim();
  const tags     = document.getElementById('bmTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const memo     = document.getElementById('bmMemo').value.trim();
  const folderId = document.getElementById('bmFolderSel').value||null;
  if (editingBmId) {
    const b = db.bookmarks.find(x=>x.id===editingBmId);
    if (b) Object.assign(b,{customIcon,name,url,tags,memo,folderId});
  } else {
    db.bookmarks.push({id:uid(),customIcon,name,url,tags,memo,folderId});
  }
  saveDB(); closeModal('bookmarkModal'); renderAll();
}

function deleteBm(id) {
  if (!confirm('このブックマークを削除しますか？')) return;
  db.bookmarks = db.bookmarks.filter(b=>b.id!==id);
  saveDB(); renderAll();
}

// ─────────────────────────────────────
//  Account CRUD
// ─────────────────────────────────────
function openAccountModal(id) {
  editingAccId = id||null;
  const a = id ? db.accounts.find(x=>x.id===id) : null;
  document.getElementById('accModalTitle').textContent = id?'アカウントを編集':'アカウントを追加';
  document.getElementById('acSite').value     = a?.site||'';
  document.getElementById('acUrl').value      = a?.url||'';
  document.getElementById('acName').value     = a?.accountName||'';
  document.getElementById('acPassword').value = a?.password||'';
  document.getElementById('acPassword').type  = 'password';
  document.getElementById('acType').value     = a?.type||'personal';
  document.getElementById('acMemo').value     = a?.memo||'';
  openModal('accountModal');
  setTimeout(()=>document.getElementById('acSite').focus(),50);
}

function saveAccount() {
  const site = document.getElementById('acSite').value.trim();
  const accountName = document.getElementById('acName').value.trim();
  if (!site||!accountName) { alert('サイト名とアカウント名は必須です'); return; }
  const data = {
    site, url:document.getElementById('acUrl').value.trim(),
    accountName, password:document.getElementById('acPassword').value,
    type:document.getElementById('acType').value,
    memo:document.getElementById('acMemo').value.trim()
  };
  if (editingAccId) {
    const a = db.accounts.find(x=>x.id===editingAccId);
    if (a) Object.assign(a,data);
  } else {
    db.accounts.push({id:uid(),...data});
  }
  saveDB(); closeModal('accountModal'); renderAll();
}

function deleteAcc(id) {
  if (!confirm('このアカウントを削除しますか？')) return;
  db.accounts = db.accounts.filter(a=>a.id!==id);
  saveDB(); renderAll();
}

// ─────────────────────────────────────
//  Modal helpers
// ─────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function onOverlayClick(e,id) { if (e.target===e.currentTarget) closeModal(id); }

// ─────────────────────────────────────
//  Color picker
// ─────────────────────────────────────
function renderColorSwatches() {
  document.getElementById('colorSwatches').innerHTML = COLORS.map(c=>
    `<div class="color-swatch${c===pickedColor?' selected':''}" style="background:${c}" onclick="pickedColor='${c}';renderColorSwatches()"></div>`
  ).join('');
}

// ─────────────────────────────────────
//  Import / Export
// ─────────────────────────────────────
function exportData() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));
  a.download = `kaneko_memo_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data.bookmarks)&&Array.isArray(data.folders)&&Array.isArray(data.accounts)) {
        if (confirm('現在のデータを上書きしてインポートしますか？')) {
          db=data; saveDB(); renderAll();
          alert(`インポート完了\nフォルダ: ${db.folders.length} / ブックマーク: ${db.bookmarks.length} / アカウント: ${db.accounts.length}`);
        }
      } else { alert('このファイルは 金子メモ のバックアップ形式ではありません'); }
    } catch { alert('JSONの解析に失敗しました'); }
    e.target.value='';
  };
  reader.readAsText(file);
}

// ─────────────────────────────────────
//  Password helpers
// ─────────────────────────────────────
function togglePwCell(id) {
  const mask = document.getElementById('pw-mask-'+id);
  const text = document.getElementById('pw-text-'+id);
  const btn  = mask.closest('.pw-cell').querySelector('.pw-reveal-btn');
  const showing = text.style.display !== 'none';
  mask.style.display = showing ? '' : 'none';
  text.style.display = showing ? 'none' : '';
  btn.textContent = showing ? '表示' : '隠す';
}

function togglePwInput() {
  const inp = document.getElementById('acPassword');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

// ─────────────────────────────────────
//  Icon / Emoji picker
// ─────────────────────────────────────
const EMOJI_PRESETS = ['🌐','📧','💼','📱','🎮','🎵','📚','🛒','🏠','🔐',
  '📊','✏️','🎯','🔬','🌍','💡','🗂️','📝','⭐','🔖','🎨','🖥️','📷','🎬','🔧'];

function renderEmojiPresets() {
  document.getElementById('emojiPresets').innerHTML = EMOJI_PRESETS.map(e=>
    `<button class="emoji-preset-btn" onclick="setEmoji('${e}')" title="${e}">${e}</button>`
  ).join('');
}

function setEmoji(emoji) {
  document.getElementById('bmIcon').value = emoji;
  updateIconPreview();
}

function updateIconPreview() {
  const val = document.getElementById('bmIcon').value.trim();
  document.getElementById('bmIconPreview').textContent = val || '🔗';
}

function clearIcon() {
  document.getElementById('bmIcon').value = '';
  updateIconPreview();
}

// ─────────────────────────────────────
//  Drag & Drop
// ─────────────────────────────────────
let draggedId = null;

function onDragStart(e, id) {
  draggedId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
  setTimeout(() => e.currentTarget.classList.add('dragging'), 0);
  document.getElementById('bmGrid').classList.add('drag-active');
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e, targetId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!draggedId || draggedId === targetId) return;

  const fromIdx = db.bookmarks.findIndex(b=>b.id===draggedId);
  const toIdx   = db.bookmarks.findIndex(b=>b.id===targetId);
  if (fromIdx===-1 || toIdx===-1) return;

  const [item] = db.bookmarks.splice(fromIdx, 1);
  db.bookmarks.splice(toIdx, 0, item);

  saveDB(); renderBookmarks();
}

function onDragEnd(e) {
  draggedId = null;
  document.querySelectorAll('.bm-card').forEach(c=>{
    c.classList.remove('dragging','drag-over');
  });
  document.getElementById('bmGrid')?.classList.remove('drag-active');
}

// ─────────────────────────────────────
//  Keyboard / click outside
// ─────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key==='Escape') {
    document.querySelectorAll('.modal-overlay.show').forEach(m=>m.classList.remove('show'));
    document.getElementById('themeDropdown').classList.remove('show');
  }
});
document.addEventListener('click', e => {
  const dropdown = document.getElementById('themeDropdown');
  const btn = document.getElementById('themeBtn');
  if (!dropdown.contains(e.target) && e.target!==btn) dropdown.classList.remove('show');
});

// ─────────────────────────────────────
//  Misc
// ─────────────────────────────────────
function openUrl(url) { if (url) window.open(url,'_blank'); }
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────
//  Boot
// ─────────────────────────────────────
applyTheme(currentThemeId);
renderColorSwatches();
renderEmojiPresets();
renderAll();
</script>
</body>
